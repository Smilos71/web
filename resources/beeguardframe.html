<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeGuard Validation</title>
    <style>
        body { 
            background: #0a0a0b; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        #status-text { font-size: 1.2rem; margin-bottom: 20px; }
        .highlight { color: #FFD700; }
        .success { color: #00ff88; }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div>
        </div>
    
    <div id="status-text">Meli is checking if you are <span class="highlight">human</span></div>
    
    <div class="cf-turnstile" 
         data-sitekey="0x4AAAAAACLHgnIQo-HPtl9m" 
         data-callback="onSuccess" 
         data-theme="dark"></div>

    <script>
        function onSuccess(token) {
            const status = document.getElementById('status-text');
            status.innerHTML = 'Verifying...';

            // Voláme tvůj PHP backend pro skutečné ověření
            fetch('https://smilos-testing001.endora.site/api/meli/v2.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'token=' + encodeURIComponent(token)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    status.innerHTML = "Access <span class='success'>Granted</span>";
                    setTimeout(() => {
                        // Oznámíme rodičovskému oknu (webmasterovi), že je čisto
                        window.parent.postMessage({ type: "beeguard-success" }, "*");
                    }, 800);
                } else {
                    status.innerHTML = "<span style='color:red'>Security Check Failed</span>";
                }
            })
            .catch(() => {
                status.innerHTML = "<span style='color:red'>Server Error</span>";
            });
        }
    </script>
</body>
</html>
