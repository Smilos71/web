<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background-color: #1a1a1a; overflow: hidden; }
        
        #slider {
            width: 100%; 
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Plynulý přechod */
            transition: opacity 1s ease-in-out;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="slider"></div>

    <script>
        var images = [
            'https://www.gamespot.com/a/uploads/original/1850/18507742/4490100-minecraft-mobs-all%2842%29.jpg',
            'https://static0.gamerantimages.com/wordpress/wp-content/uploads/2021/01/How-To-Tame-Parrots-In-Minecraft-Colors.jpg?q=50&fit=crop&w=825&dpr=1.5',
            'https://res.cloudinary.com/ddbybfkod/image/upload/v1677054085/blogs/Vanya/how-to-breed-parrots-in-minecraft/img1_chvxzx.png'
        ];

        var slider = document.getElementById('slider');
        var lastIndex = -1;

        // Funkce pro výběr náhodného indexu (nesmí být stejný jako minulý)
        function getNextIndex() {
            if (images.length <= 1) return 0;
            var idx;
            do {
                idx = Math.floor(Math.random() * images.length);
            } while (idx === lastIndex);
            lastIndex = idx;
            return idx;
        }

        function changeImage() {
            // 1. Začít stmívat
            slider.style.opacity = "0";

            // 2. Počkat na zatmění (1s), vyměnit a rozsvítit
            setTimeout(function() {
                var nextIdx = getNextIndex();
                var img = new Image();
                
                // Nejdřív obrázek načteme "nanečisto"
                img.onload = function() {
                    slider.style.backgroundImage = "url('" + images[nextIdx] + "')";
                    // Malá pauza, aby IE stihl zareagovat na změnu backgroundu
                    setTimeout(function() {
                        slider.style.opacity = "1";
                    }, 100);
                };
                
                // Pokud by se obrázek nenačetl (chyba 404), zkusíme jiný
                img.onerror = function() {
                    changeImage(); 
                };

                img.src = images[nextIdx];
            }, 1000);
        }

        // --- START ---
        if (images.length > 0) {
            var firstIdx = getNextIndex();
            slider.style.backgroundImage = "url('" + images[firstIdx] + "')";
            
            // Spustit smyčku každých 20 sekund
            setInterval(changeImage, 20000);
        }
    </script>
</body>
</html>
