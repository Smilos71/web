<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="UTF-8">
    <style>
        /* Úplný reset */
        * { margin: 0; padding: 0; border: 0; }
        html, body { width: 100%; height: 100%; background-color: #1a1a1a; overflow: hidden; }

        /* Obrázek přes celou obrazovku */
        #slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Klasický img tag místo backgroundu -->
    <img id="slider" src="" alt="prezentace" />

    <script>
        var images = [
            'https://www.gamespot.com/a/uploads/original/1850/18507742/4490100-minecraft-mobs-all%2842%29.jpg',
            'https://static0.gamerantimages.com/wordpress/wp-content/uploads/2021/01/How-To-Tame-Parrots-In-Minecraft-Colors.jpg?q=50&fit=crop&w=825&dpr=1.5',
            'https://res.cloudinary.com/ddbybfkod/image/upload/v1677054085/blogs/Vanya/how-to-breed-parrots-in-minecraft/img1_chvxzx.png'
        ];

        var imgElement = document.getElementById('slider');
        var lastIndex = -1;

        function getNextIndex() {
            if (images.length <= 1) return 0;
            var idx;
            do {
                idx = Math.floor(Math.random() * images.length);
            } while (idx === lastIndex);
            lastIndex = idx;
            return idx;
        }

        function changeImage() {
            var nextIdx = getNextIndex();
            // Natvrdo změníme zdroj obrázku bez animací
            imgElement.src = images[nextIdx];
        }

        // --- START ---
        if (images.length > 0) {
            // Načtení prvního obrázku hned
            changeImage();
            
            // Interval 20 sekund (v IE funguje spolehlivě)
            setInterval(changeImage, 20000);
        }
    </script>
</body>
</html>
