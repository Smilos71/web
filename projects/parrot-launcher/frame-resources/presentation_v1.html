<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a1a1a; overflow: hidden; width: 100%; height: 100%; }
        
        #slider {
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Animace opacity pro IE10+ */
            transition: opacity 1.2s ease-in-out;
            opacity: 1;
            /* Podpora pro starší IE filtry */
            filter: alpha(opacity=100);
        }
    </style>
</head>
<body>
    <div id="slider"></div>

    <script>
        var images = [
            'https://www.gamespot.com/a/uploads/original/1850/18507742/4490100-minecraft-mobs-all%2842%29.jpg',
            'https://static0.gamerantimages.com/wordpress/wp-content/uploads/2021/01/How-To-Tame-Parrots-In-Minecraft-Colors.jpg?q=50&fit=crop&w=825&dpr=1.5',
            'https://res.cloudinary.com/ddbybfkod/image/upload/v1677054085/blogs/Vanya/how-to-breed-parrots-in-minecraft/img1_chvxzx.png'
        ];

        // --- PRELOAD LOGIKA PRO STARÉ PROHLÍŽEČE ---
        var preloadedImages = [];
        for (var i = 0; i < images.length; i++) {
            preloadedImages[i] = new Image();
            preloadedImages[i].src = images[i];
        }

        var slider = document.getElementById('slider');
        var lastIndex = -1;

        function getRandomIndex() {
            if (images.length <= 1) return 0;
            var newIndex;
            do {
                newIndex = Math.floor(Math.random() * images.length);
            } while (newIndex === lastIndex);
            lastIndex = newIndex;
            return newIndex;
        }

        function updateImage() {
            // 1. Schovat
            slider.style.opacity = '0';
            if(slider.filters) slider.filters.item("DXImageTransform.Microsoft.Alpha").opacity = 0;

            // 2. Počkat na zatmívačku
            setTimeout(function() {
                var index = getRandomIndex();
                var nextImg = images[index];

                // 3. Vyměnit pozadí
                slider.style.backgroundImage = "url('" + nextImg + "')";

                // 4. KRITICKÝ KROK: Dáme IE čas se nadechnout a vykreslit pozadí v paměti
                setTimeout(function() {
                    slider.style.opacity = '1';
                    if(slider.filters) slider.filters.item("DXImageTransform.Microsoft.Alpha").opacity = 100;
                }, 250); // Mírná prodleva před rozsvícením

            }, 1200);
        }

        // Start
        if (images.length > 0) {
            var first = getRandomIndex();
            slider.style.backgroundImage = "url('" + images[first] + "')";
            
            // Interval 20s
            setInterval(updateImage, 20000);
        }
    </script>
</body>
</html>
